name: pretzer.io

on:
  push:
    branches:
      - main
    paths:
      - 'pretzer.io/www/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  github-pages:
    uses: ./.github/workflows/_deploy_to_github_pages.yaml
    with:
      local_path: 'pretzer.io/www'